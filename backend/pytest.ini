[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths =
    accounts/tests
    estates/tests
    residents/tests
    visitors/tests
    security/tests
    billing/tests
    payments/tests
    marketplace/tests
    core/tests
    ai/tests
    tests
addopts =
    --strict-markers
    --tb=short
    -ra
    -p no:locust
markers =
    integration: end-to-end integration tests
    security: security and OWASP-related tests
    slow: slow-running tests
