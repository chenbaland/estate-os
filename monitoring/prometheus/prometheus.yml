global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: estateos-backend
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: api
          environment: development

  - job_name: estateos-nginx
    static_configs:
      - targets: ["nginx:80"]
        labels:
          service: nginx
          environment: development

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: postgres

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]
        labels:
          service: rabbitmq

  - job_name: elasticsearch
    metrics_path: /_prometheus/metrics
    static_configs:
      - targets: ["elasticsearch:9200"]
        labels:
          service: elasticsearch

  - job_name: celery
    static_configs:
      - targets: ["celery-exporter:9808"]
        labels:
          service: celery-worker
