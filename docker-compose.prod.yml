# EstateOS production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

x-backend-prod-env: &backend-prod-env
  DJANGO_SETTINGS_MODULE: config.settings.production
  DEBUG: "false"
  SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-true}
  USE_S3: ${USE_S3:-true}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
  AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-eu-west-1}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

services:
  postgres:
    ports: []
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  redis:
    ports: []
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  rabbitmq:
    ports: []
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  elasticsearch:
    ports: []
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: ${ELASTICSEARCH_PASSWORD}
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  backend:
    image: ${ECR_REGISTRY:-estateos}/backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-prod-env
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CHANNEL_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
    volumes: []
    ports: []
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: 2G

  celery-worker:
    image: ${ECR_REGISTRY:-estateos}/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      <<: *backend-prod-env
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
    volumes: []
    command:
      - celery
      - -A
      - config
      - worker
      - -l
      - info
      - --concurrency=4
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: 2G

  celery-beat:
    image: ${ECR_REGISTRY:-estateos}/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      <<: *backend-prod-env
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes: []
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  frontend:
    image: ${ECR_REGISTRY:-estateos}/frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    volumes: []
    ports: []
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1"
          memory: 1G

  nginx:
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: estateos-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports: []
    networks:
      - estateos

  grafana:
    image: grafana/grafana:10.4.0
    container_name: estateos-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    networks:
      - estateos

volumes:
  prometheus_data:
  grafana_data:
