# EstateOS local development stack
# Usage: docker compose up -d

x-backend-env: &backend-env
  DJANGO_SETTINGS_MODULE: config.settings.development
  SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
  DEBUG: ${DEBUG:-true}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,nginx}
  DB_NAME: ${DB_NAME:-estateos}
  DB_USER: ${DB_USER:-estateos}
  DB_PASSWORD: ${DB_PASSWORD:-estateos}
  DB_HOST: postgres
  DB_PORT: 5432
  REDIS_URL: redis://redis:6379/0
  CHANNEL_REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672//
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  ELASTICSEARCH_URL: http://elasticsearch:9200
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost}

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: estateos-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-estateos}
      POSTGRES_USER: ${DB_USER:-estateos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-estateos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-estateos} -d ${DB_NAME:-estateos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - estateos

  redis:
    image: redis:7-alpine
    container_name: estateos-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - estateos

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: estateos-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - estateos

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: estateos-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
    networks:
      - estateos

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: estateos-backend
    entrypoint: ["/app/scripts/entrypoint.sh"]
    command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "config.asgi:application"]
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - estateos

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: estateos-celery-worker
    entrypoint: ["/app/scripts/celery-worker-entrypoint.sh"]
    command:
      - celery
      - -A
      - config
      - worker
      - -l
      - info
      - --concurrency=2
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - estateos

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: estateos-celery-beat
    entrypoint: ["/app/scripts/celery-beat-entrypoint.sh"]
    command:
      - celery
      - -A
      - config
      - beat
      - -l
      - info
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - estateos

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: estateos-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost/ws}
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - estateos

  nginx:
    image: nginx:1.25-alpine
    container_name: estateos-nginx
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - backend_static:/var/www/static:ro
      - backend_media:/var/www/media:ro
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - estateos

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  elasticsearch_data:
  backend_static:
  backend_media:

networks:
  estateos:
    driver: bridge
