# =============================================================================
# EstateOS — Complete Holistic Test Environment
# =============================================================================
# Spins up the full stack with:
#   - Pre-seeded demo data (2 estates, 12+ users, all modules populated)
#   - Interactive API explorer (Swagger UI) at http://localhost/api/docs/
#   - Django admin at http://localhost/admin/
#   - RabbitMQ management UI at http://localhost:15672/
#   - Mailpit (email catcher) at http://localhost:8025/
#   - Backend API at http://localhost/api/v1/
#   - Frontend web app at http://localhost/
#
# Usage:
#   docker compose -f docker-compose.testenv.yml up --build
#   docker compose -f docker-compose.testenv.yml down -v   # nuke everything
# =============================================================================

x-backend-env: &backend-env
  DJANGO_SETTINGS_MODULE: config.settings.development
  SECRET_KEY: T7TSd4C1wxHq73FNz7oHQyPYfrXRBXa8y_4j7kAXlzN5t8CYg8TWZspj1Uzkfb0Tbs0
  DEBUG: "true"
  ALLOWED_HOSTS: "localhost,127.0.0.1,backend,nginx,0.0.0.0"
  DB_NAME: estateos
  DB_USER: estateos
  DB_PASSWORD: estateos_testenv
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_CONN_MAX_AGE: "60"
  REDIS_URL: redis://redis:6379/0
  CHANNEL_REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: amqp://estateos:estateos@rabbitmq:5672/estateos
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  ELASTICSEARCH_URL: http://elasticsearch:9200
  ELASTICSEARCH_AUTOSYNC: "false"
  ELASTICSEARCH_AUTO_REFRESH: "false"
  CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:3000,http://127.0.0.1,http://127.0.0.1:3000"
  EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
  EMAIL_HOST: mailpit
  EMAIL_PORT: "1025"
  EMAIL_USE_TLS: "false"
  EMAIL_HOST_USER: ""
  EMAIL_HOST_PASSWORD: ""
  DEFAULT_FROM_EMAIL: noreply@estateos-test.local
  FRONTEND_URL: http://localhost
  RATELIMIT_ENABLE: "false"
  LOG_LEVEL: INFO
  # Payment providers — disabled/test mode in test env
  PAYSTACK_SECRET_KEY: ""
  FLUTTERWAVE_SECRET_KEY: ""
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  # OAuth — disabled in test env (use email/password login)
  GOOGLE_OAUTH_CLIENT_ID: ""
  GOOGLE_OAUTH_CLIENT_SECRET: ""
  APPLE_OAUTH_CLIENT_ID: ""
  OAUTH_REDIRECT_URL: http://localhost/auth/callback

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: estateos-test-postgres
    environment:
      POSTGRES_DB: estateos
      POSTGRES_USER: estateos
      POSTGRES_PASSWORD: estateos_testenv
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estateos -d estateos"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - estateos-test

  redis:
    image: redis:7-alpine
    container_name: estateos-test-redis
    command: redis-server --appendonly yes
    volumes:
      - test_redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - estateos-test

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: estateos-test-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: estateos
      RABBITMQ_DEFAULT_PASS: estateos
      RABBITMQ_DEFAULT_VHOST: estateos
    volumes:
      - test_rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"   # Management UI → http://localhost:15673 (estateos/estateos)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - estateos-test

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: estateos-test-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms256m -Xmx256m
    volumes:
      - test_elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9201:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - estateos-test

  # ---------------------------------------------------------------------------
  # Mailpit — catches all outbound emails, browse at http://localhost:8025
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: estateos-test-mailpit
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    environment:
      MP_MAX_MESSAGES: "200"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    networks:
      - estateos-test

  # ---------------------------------------------------------------------------
  # Backend — migrate + seed on first start
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: estateos-test-backend
    entrypoint: ["/app/scripts/testenv-entrypoint.sh"]
    command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "config.asgi:application"]
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
      - test_backend_static:/app/staticfiles
      - test_backend_media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - estateos-test

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: estateos-test-celery-worker
    entrypoint: ["/app/scripts/celery-worker-entrypoint.sh"]
    command: ["celery", "-A", "config", "worker", "-l", "info", "--concurrency=2"]
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - estateos-test

  # ---------------------------------------------------------------------------
  # Frontend — Next.js dev server with hot reload
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: estateos-test-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost/ws
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - estateos-test

  # ---------------------------------------------------------------------------
  # Nginx — unified reverse proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: estateos-test-nginx
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - test_backend_static:/var/www/static:ro
      - test_backend_media:/var/www/media:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - estateos-test

volumes:
  test_postgres_data:
  test_redis_data:
  test_rabbitmq_data:
  test_elasticsearch_data:
  test_backend_static:
  test_backend_media:

networks:
  estateos-test:
    driver: bridge
